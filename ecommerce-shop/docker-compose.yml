services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppass
      POSTGRES_DB: shopdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://shopuser:shoppass@db:5432/shopdb
      PORT: 4000
      NODE_ENV: development
      DB_SSL: "false"
      CORS_ORIGIN: http://51.21.100.8
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./my-shop
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
