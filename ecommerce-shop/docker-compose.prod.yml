services:
  api:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: ./my-shop
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api
